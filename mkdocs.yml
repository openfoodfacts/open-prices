# Where to find documentation
docs_dir: docs

# Link to Github on every page
repo_url: https://github.com/openfoodfacts/open-prices
edit_uri: blob/main/docs/

site_name: Open Prices
site_dir: gh_pages

theme:
  name: material
  features:
    - content.action.edit
  logo: https://static.openfoodfacts.org/images/logos/off-logo-horizontal-light.svg
  favicon: https://static.openfoodfacts.org/images/logos/off-logo-favicon-light.png
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
markdown_extensions:
  - footnotes
  - mdx_truly_sane_lists
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: README.md
  - Guides:
    - Home: guides/README.md
    - "Web: add multiple prices (from shelf images)": guides/web-add-multiple-prices-shelf.md
    - "Web: add multiple prices (from a receipt)": guides/web-add-multiple-prices-receipt.md
    - API: guides/API.md
  - Topics:
    - Home: topics/README.md
    - Core: topics/core.md
    - Open Food Facts (Product data): topics/open-food-facts-product-data.md
    - OpenStreetMap (Location data): topics/openstreetmap-location-data.md
    - Gamification: topics/gamification.md
    - Moderation & Historisation: topics/moderation-historisation.md
  - Community:
    - Home: community/README.md
    - Github: community/github.md
    - Slack: community/slack.md
    - Weekly meetings: community/weekly-meetings.md
    - Contributing: community/CONTRIBUTING.md
    - Install: community/INSTALL.md
    - UX & UI: community/ux-ui.md
    - Changelog: community/CHANGELOG.md

plugins:
  - search
